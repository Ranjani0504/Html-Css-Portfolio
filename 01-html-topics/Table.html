<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table in HTML</title>
</head>
<body>
    <h1>Table In HTML</h1>
    <table border="1" height="200" width="500"  cellspacing="10" cellpadding="10"> 

        <caption>EMPLOYEE TABLE</caption>
        <tr>
            <th>EID</th>
            <th>ENAME</th>
            <th>SALARY</th>
        </tr>
        
        <tr>
            <td>1</td>
            <td>Miller</td>
            <td>5000</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Blake</td>
            <td>3000</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Scott</td>
            <td>9000</td>
        </tr>
    </table>

    <h1>Table with rowspan and colspan</h1>
    <table border="1" width="200" height="100" cellspacing="10" cellpadding="10">
        <caption>rowspan and colspan</caption>
        <tr>
           <td>1</td>
           <td>2</td>
           <td>3</td>
        </tr>

        <tr>
            <td colspan="2">4</td>
            <td>5</td>
        </tr>

        <tr>
            <td rowspan="2">6</td>
            <td>7</td>
            <td rowspan="3">8</td>
        </tr>

        <tr>
            <td>9</td>
        </tr>

       <tr>
        <td colspan="2">10</td>
       </tr>
    </table>

</body>
</html>
