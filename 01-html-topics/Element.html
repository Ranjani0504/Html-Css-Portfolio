<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element in HTML</title>
</head>
<body>
    <h1>Elements in Html</h1>

    <h2>1.Inline level Elements</h2>
    <p>Inline level Element are displayed in the same line and also here we cannot assign height and width</p>
    <p><b>For Example:</b> b , i , span ,etc ,...</p>

    <!-- <b> Tag -->
    <b>Jayasree</b>
    <b>Ranjani</b>
    <b>Keerthana</b>
    <b>Sangeetha</b>

    <!-- <i> Tag -->
    <i>Jayasree</i>
    <i>Ranjani</i>
    <i>Keerthana</i>
    <i>Sangeetha</i>

    <!-- <span> Tag -->
    <span>Jayasree</span>
    <span>Ranjani</span>
    <span>Keerthana</span>
    <span>Sangeetha</span>


    

</body>
</html>
