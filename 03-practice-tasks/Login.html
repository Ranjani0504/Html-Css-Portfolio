<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>
    <link rel="stylesheet" href="./Login.css">
     <link rel="shortcut icon" href="https://static.xx.fbcdn.net/rsrc.php/yx/r/e9sqr8WnkCf.ico" type="image/x-icon">
</head>
<body>
    <!-- main>section>(div>img)+(div>form>h3+input*2+button) -->

    <main>
        <section>
            <div id="top"><img src="https://static.xx.fbcdn.net/rsrc.php/y1/r/4lCu2zih0ca.svg" alt=""></div>
            <div id="bottom">
                <form action="" autocomplete="on">
                    <fieldset>
                    <h3>Log in to FaceBook</h3> 
                    <input type="text" placeholder="Email address or Phone Number" required> <br> 
                    <input type="password" placeholder="Password" id="input2" required> <br> 
                    <button>Log in</button>
                     <div id="anc">
                         <a href="">Forgotten account?</a>
                         <a href="">Sign up for Facebook</a>
                     </div>
                    </fieldset>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
