<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp Task</title>
    <link rel="stylesheet" href="./Signup.css">
</head>
<body>
    <div class="outer">
        <div class="left">
            <img src="https://img.freepik.com/free-vector/mobile-login-concept-illustration_114360-83.jpg?semt=ais_items_boosted&w=740" alt="">
        </div>
        <div class="right">
            <main>
            <h1>signup page</h1>
            <form action="">
                <label for="name">Name</label> <br> 
                <input type="text" name="" id="name" placeholder="Enter your Name"> <br> <br>

                 <label for="email">E-mail</label> <br>
                <input type="text" name="" id="email" placeholder="Enter your Email"> <br> <br>

                 <label for="pass">Password</label> <br>
                <input type="text" name="" id="pass" placeholder="Enter your Password"> <br>

                <button>Register</button>

                <div class="footer">
                     <p>already you have an account?</p>
                     <a href="">signup</a>
                </div>
            </form>
            </main>
        </div>
    </div>    
</body>
</html>
